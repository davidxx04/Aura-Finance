<div class="budget-container">

  @if (selectedMonth() === null) {

    <!-- Vista anual -->
    <div class="budget-header-view">
      <h1 class="budget-title">Budget</h1>
      <p class="budget-subtitle">Select a month to edit</p>
    </div>

    <!-- Year navigator -->
    <div class="year-nav-container">
      <button (click)="prevYear()" class="year-nav-btn">
        <mat-icon class="btn-icon">chevron_left</mat-icon>
      </button>
      <span class="year-label">{{ selectedYear() }}</span>
      <button (click)="nextYear()" [disabled]="selectedYear() >= today.getFullYear()" class="year-nav-btn">
        <mat-icon class="btn-icon">chevron_right</mat-icon>
      </button>
    </div>

    <!-- Grid de meses -->
    <div class="months-grid">
      @for (cell of months(); track cell.month) {
        <button
          (click)="selectMonth(cell)"
          class="month-card"
          [class.is-future]="cell.isFuture"
          [class.is-current]="cell.isCurrent"
        >
          <div class="month-card-header">
            <span class="month-label">{{ cell.label }}</span>
            @if (cell.isCurrent) {
              <span class="badge-current">Current</span>
            }
            @if (cell.hasData && !cell.isCurrent) {
              <span class="badge-done">Done</span>
            }
          </div>
          <p class="month-data">
            @if (cell.hasData) {
              {{ getMonthTotal(cell.month) | currency:'EUR':'symbol':'1.0-0' }} income
            } @else if (!cell.isFuture) {
              No data yet
            } @else {
              Upcoming
            }
          </p>
        </button>
      }
    </div>

  } @else {

    <!-- Vista de mes -->
    <div class="month-view-header">
      <button (click)="goBack()" class="btn-back">
        <mat-icon class="btn-icon-small">arrow_back</mat-icon>
        Back to {{ selectedYear() }}
      </button>
      <h1 class="month-title">
        {{ monthNames[(+selectedMonth()!.split('-')[1]) - 1] }} {{ selectedMonth()!.split('-')[0] }}
      </h1>
    </div>

    <app-budget-cards [month]="selectedMonth()!" />

  }

</div>
