<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px;">

  @for (section of sections; track section.type) {
    <button
      (click)="openDialog(section.type)"
      style="border-radius:16px; border:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.03); padding:20px; text-align:left; cursor:pointer; transition:all 0.2s; width:100%;"
      onmouseenter="this.style.background='rgba(255,255,255,0.06)'; this.style.borderColor='rgba(255,255,255,0.1)'"
      onmouseleave="this.style.background='rgba(255,255,255,0.03)'; this.style.borderColor='rgba(255,255,255,0.05)'"
    >
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
        <span style="color:rgba(255,255,255,0.4); font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.08em;">
          {{ section.label }}
        </span>
        <div style="width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center;" [style.background]="section.bgColor">
          <mat-icon style="font-size:16px; width:16px; height:16px;" [style.color]="section.iconColor">{{ section.icon }}</mat-icon>
        </div>
      </div>
      <p style="font-size:24px; font-weight:600; margin:0;" [style.color]="section.valueColor">
        {{ section.value() | currency:'EUR':'symbol':'1.2-2' }}
      </p>
      <p style="font-size:11px; color:rgba(255,255,255,0.2); margin:6px 0 0;">Click to edit</p>
    </button>
  }

  <!-- Expected savings card -->
  <div style="border-radius:16px; border:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.03); padding:20px;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
      <span style="color:rgba(255,255,255,0.4); font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.08em;">
        Expected savings
      </span>
      <div style="width:32px; height:32px; border-radius:8px; background:rgba(96,165,250,0.1); display:flex; align-items:center; justify-content:center;">
        <mat-icon style="font-size:16px; width:16px; height:16px; color:#60a5fa;">flag</mat-icon>
      </div>
    </div>

    @if (editingExpectedSavings()) {
      <div style="display:flex; gap:8px; align-items:center;">
        <input
          type="number"
          [value]="expectedSavingsValue()"
          (input)="expectedSavingsValue.set(+$event.target.value)"
          (keyup.enter)="saveExpectedSavings()"
          autofocus
          style="flex:1; background:rgba(255,255,255,0.06); border:1px solid rgba(96,165,250,0.4); border-radius:8px; padding:6px 10px; color:white; font-size:18px; font-weight:600; outline:none; width:100%;"
        />
        <button (click)="saveExpectedSavings()" style="background:#7c3aed; border:none; border-radius:8px; padding:6px 12px; color:white; cursor:pointer; font-size:13px;">
          Save
        </button>
      </div>
    } @else {
      <div style="display:flex; align-items:flex-end; justify-content:space-between;">
        <p style="font-size:24px; font-weight:600; margin:0; color:#60a5fa;">
          {{ budgetStore.currentExpectedSavings() | currency:'EUR':'symbol':'1.2-2' }}
        </p>
        <button (click)="startEditExpectedSavings()" style="background:none; border:none; cursor:pointer; color:rgba(255,255,255,0.2); padding:0; display:flex; align-items:center;">
          <mat-icon style="font-size:16px; width:16px; height:16px;">edit</mat-icon>
        </button>
      </div>
      <p style="font-size:11px; color:rgba(255,255,255,0.2); margin:6px 0 0;">Click edit to change</p>
    }
  </div>

</div>
