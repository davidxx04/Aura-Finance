<div class="budget-cards-grid">

  @for (section of sections; track section.type) {
    <button
      (click)="openDialog(section.type)"
      class="budget-card"
    >
      <div class="budget-card-header">
        <span class="budget-card-label">
          {{ section.label }}
        </span>
        <div class="budget-card-icon-container" [style.background]="section.bgColor">
          <mat-icon class="budget-card-icon" [style.color]="section.iconColor">{{ section.icon }}</mat-icon>
        </div>
      </div>
      <p class="budget-card-value" [style.color]="section.valueColor">
        {{ section.value() | currency:'EUR':'symbol':'1.2-2' }}
      </p>
      <p class="budget-card-hint">Click to edit</p>
    </button>
  }

  <!-- Extra savings card -->
  @if (editingExtraSavings()) {
    <div class="extra-savings-card">
      <div class="budget-card-header">
        <span class="budget-card-label">
          Extra savings (end of month)
        </span>
        <div class="budget-card-icon-container extra-savings-icon-container">
          <mat-icon class="budget-card-icon extra-savings-icon">stars</mat-icon>
        </div>
      </div>
      <div class="extra-savings-input-container">
        <div class="extra-savings-input-wrapper">
          <span class="extra-savings-currency">€</span>
          <input
            #extraInput
            type="number"
            [value]="extraSavingsValue() === 0 ? '' : extraSavingsValue()"
            (input)="extraSavingsValue.set(+$event.target.value)"
            (keyup.enter)="saveExtraSavings()"
            (blur)="saveExtraSavings()"
            placeholder="0.00"
            class="no-spinners extra-savings-input"
          />
        </div>
      </div>
    </div>
  } @else {
    <button
      (click)="startEditExtraSavings()"
      class="budget-card"
    >
      <div class="budget-card-header">
        <span class="budget-card-label">
          Extra savings (end of month)
        </span>
        <div class="budget-card-icon-container extra-savings-icon-container">
          <mat-icon class="budget-card-icon extra-savings-icon">stars</mat-icon>
        </div>
      </div>
      <p class="budget-card-value extra-savings-value">
        {{ budgetStore.currentExtraSavings() | currency:'EUR':'symbol':'1.2-2' }}
      </p>
      <p class="budget-card-hint">Click to edit</p>
    </button>
  }

</div>
